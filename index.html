<!DOCTYPE html> 
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Operation Grå Vinge</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#6b9e78; --red:#c23b2e; --gold:#c9a24b;
    --ink:#0e1419; --line:#283038;
    --paper:#efe9dc; --paper-ink:#2c2823; --muted-paper:#8a8072;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% -10%, #16232c, #0a0f14 70%);color:#e7ecea;font-family:'Inter',system-ui,sans-serif;display:flex;justify-content:center;padding:18px 14px 30px}
  .stage{width:100%;max-width:660px}
  .head{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:2.5px;font-size:12px;color:var(--muted-paper);text-align:center;margin:2px 0 14px}
  .card{background:var(--paper);color:var(--paper-ink);border-radius:10px;padding:22px 22px 24px;position:relative;box-shadow:0 20px 46px rgba(0,0,0,.45);overflow:hidden;
    background-image:repeating-linear-gradient(0deg, rgba(44,40,35,.022) 0 1px, transparent 1px 3px);}
  .card::after{content:"FORTROLIGT";position:absolute;right:-30px;bottom:6px;font-family:'Oswald',sans-serif;font-size:74px;font-weight:700;color:rgba(44,40,35,.05);letter-spacing:4px;pointer-events:none}
  .card>*{position:relative;z-index:1}
  .stamp{position:absolute;top:16px;right:16px;z-index:3;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:2px;font-size:12px;border:2px solid var(--red);color:var(--red);padding:4px 10px;border-radius:4px;transform:rotate(6deg);animation:stampIn .35s cubic-bezier(.2,2.4,.4,1) both}
  @keyframes stampIn{from{transform:rotate(6deg) scale(2.4);opacity:0}to{transform:rotate(6deg) scale(1);opacity:1}}
  .meta{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted-paper)}
  .country{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px;color:var(--green);margin-top:6px}
  h1.title{font-family:'Oswald',sans-serif;font-size:31px;margin:5px 0 12px;line-height:1.05;color:#211d18}
  .situation{font-size:15.5px;line-height:1.55;color:#2c2823;margin:0}
  .situation+.situation{margin-top:10px}
  .opgaver{margin:14px 0 4px;border:1px dashed #b9ae99;border-radius:8px;padding:12px 14px;background:rgba(255,255,255,.35)}
  .opg{display:flex;gap:10px;align-items:baseline;font-size:14.5px;line-height:1.5;padding:3px 0}
  .opg b{font-family:'Space Mono',monospace;font-size:11px;color:var(--red);letter-spacing:1px;flex:none}
  .advarsel{margin-top:12px;font-family:'Space Mono',monospace;font-size:11.5px;line-height:1.55;color:#7a5230;background:rgba(201,162,75,.14);border-left:3px solid var(--gold);padding:8px 10px;border-radius:0 6px 6px 0}
  .verdict{display:flex;align-items:center;gap:9px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px;font-size:19px;margin:4px 0 10px}
  .verdict .dot{width:11px;height:11px;border-radius:50%;flex:none}
  .rang{display:inline-block;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1.5px;font-size:14px;background:var(--ink);color:var(--gold);padding:5px 12px;border-radius:4px;margin:2px 0 12px}
  .citat{margin:14px 0 4px;font-size:14.5px;line-height:1.55;font-style:italic;color:#4a4438;border-left:3px solid #c9c0ae;padding-left:12px}
  .citat span{display:block;font-style:normal;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted-paper);margin-top:5px}
  .fotos{display:flex;flex-wrap:wrap;gap:12px;margin:16px 0 4px;justify-content:center}
  .foto{background:#fdfcf8;padding:7px 7px 9px;border-radius:2px;box-shadow:0 6px 14px rgba(0,0,0,.22);transform:rotate(var(--rot));width:128px}
  .foto canvas{display:block;width:114px;height:100px;border-radius:1px}
  .foto p{margin:6px 0 0;font-family:'Space Mono',monospace;font-size:8.5px;line-height:1.45;letter-spacing:.2px;color:#3c372e;text-transform:uppercase}
  .best{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px;color:var(--muted-paper);margin-top:12px}
  .best b{color:#7a5230}
  .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
  .btn{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1.2px;font-size:14px;padding:12px 18px;border-radius:6px;border:1px solid var(--line);background:#1c252d;color:#e7ecea;cursor:pointer;transition:transform .05s}
  .btn:active{transform:translateY(1px)}
  .btn:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
  .btn.go{background:var(--green);border-color:var(--green);color:#0e1419;font-weight:600}
  .btn.big{font-size:15px;padding:13px 22px}
  .wrap{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--line);background:#0b1118;box-shadow:0 20px 46px rgba(0,0,0,.45)}
  .hud{display:flex;justify-content:space-between;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.3px;color:#cdd6d6;padding:9px 12px;background:#11181f;border-bottom:1px solid var(--line)}
  .hud b{color:var(--gold)}
  .hud button{background:none;border:1px solid var(--line);border-radius:5px;color:#cdd6d6;font-size:13px;cursor:pointer;padding:2px 8px;line-height:1.4}
  canvas.spil{display:block;width:100%;height:auto;cursor:crosshair;touch-action:manipulation;background:#9fc0d8}
  .foot{text-align:center;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.4px;color:var(--muted-paper);margin-top:16px;line-height:1.6}
</style>
</head>
<body>
  <div class="stage">
    <div class="head" id="head">Operation Grå Vinge</div>
    <div id="app"></div>
    <div class="foot">Satire. Enhver fugl i denne operation er fiktiv og fløj frivilligt.<br>Grafik og databehandling: en meget tvivlsom kilde.</div>
  </div>
<script>
(function(){
  const app = document.getElementById('app');
  const head = document.getElementById('head');
  const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  let RAF = null;
  function cancel(){ if(RAF){ cancelAnimationFrame(RAF); RAF=null; } }

  /* ---------- Lyd (lille synth, ingen filer) ---------- */
  const snd = { on:true, ctx:null };
  function ac(){ if(!snd.ctx){ try{ snd.ctx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ snd.on=false; } } return snd.ctx; }
  function tone(f0,f1,dur,type,vol){
    if(!snd.on) return; const c=ac(); if(!c) return;
    const o=c.createOscillator(), g=c.createGain(), t=c.currentTime;
    o.type=type||'square'; o.frequency.setValueAtTime(f0,t); o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t+dur);
    g.gain.setValueAtTime(vol||.15,t); g.gain.exponentialRampToValueAtTime(.001,t+dur);
    o.connect(g); g.connect(c.destination); o.start(t); o.stop(t+dur+.02);
  }
  function noise(dur,vol,hp){
    if(!snd.on) return; const c=ac(); if(!c) return;
    const n=Math.floor(c.sampleRate*dur), b=c.createBuffer(1,n,c.sampleRate), d=b.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
    const s=c.createBufferSource(); s.buffer=b;
    const f=c.createBiquadFilter(); f.type=hp?'highpass':'lowpass'; f.frequency.value=hp?1800:900;
    const g=c.createGain(); g.gain.value=vol||.2;
    s.connect(f); f.connect(g); g.connect(c.destination); s.start();
  }
  const sPop   = ()=>{ tone(660,990,.09,'square',.12); };
  const sSpray = ()=>{ noise(.16,.14,true); };
  const sStamp = ()=>{ tone(160,70,.12,'square',.2); noise(.06,.12,false); };
  const sSkud  = ()=>{ noise(.1,.3,false); tone(220,60,.08,'sawtooth',.12); };
  const sHit   = ()=>{ tone(880,240,.18,'triangle',.16); };
  const sAlarm = ()=>{ tone(520,520,.12,'square',.14); setTimeout(()=>tone(392,392,.16,'square',.14),130); };
  const sFanfare = ok=>{ if(ok){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,f,.14,'triangle',.13), i*110)); } else { tone(300,140,.5,'sawtooth',.1); } };

  /* ---------- Fugletegning med baskende vinger ---------- */
  const KYR=['\u042f','\u0416','\u0424','\u0414','\u0411','\u0413','\u0417','\u041b','\u041f','\u0426','\u0427','\u0428','\u042e'];
  const GRAA='#8a9095';
  function mix(a,b,t){
    const pa=[parseInt(a.slice(1,3),16),parseInt(a.slice(3,5),16),parseInt(a.slice(5,7),16)];
    const pb=[parseInt(b.slice(1,3),16),parseInt(b.slice(3,5),16),parseInt(b.slice(5,7),16)];
    const m=pa.map((v,i)=>Math.round(v+(pb[i]-v)*t));
    return 'rgb('+m[0]+','+m[1]+','+m[2]+')';
  }
  function drawBird(ctx,b){
    const d = b.face || (b.vx<0?-1:1);
    const t = (b.paint||0);
    const kro = mix(b.col, GRAA, t);
    const vin = mix(b.wing, '#6f767b', t);
    const flap = Math.sin(b.bob*2.1);
    const r=b.r;
    ctx.save(); ctx.translate(b.x,b.y); ctx.scale(d,1); if(b.spin) ctx.rotate(b.spin);
    // hale
    ctx.fillStyle=vin;
    ctx.beginPath(); ctx.moveTo(-r*0.7,0); ctx.lineTo(-r*1.5,-r*0.35); ctx.lineTo(-r*1.5,r*0.3); ctx.closePath(); ctx.fill();
    if(b.k==='oern'){ ctx.fillStyle='#f2efe6'; ctx.beginPath(); ctx.moveTo(-r*0.9,0); ctx.lineTo(-r*1.5,-r*0.28); ctx.lineTo(-r*1.5,r*0.24); ctx.closePath(); ctx.fill(); }
    // bagvinge
    ctx.fillStyle=mix(vin,'#000000',.12);
    ctx.beginPath(); ctx.moveTo(-r*0.1,-r*0.1);
    ctx.quadraticCurveTo(-r*0.9, -r*0.1 - flap*r*0.95, -r*1.35, -r*0.15 - flap*r*1.25);
    ctx.quadraticCurveTo(-r*0.75, r*0.22 - flap*r*0.45, -r*0.05, r*0.18); ctx.closePath(); ctx.fill();
    // krop
    ctx.fillStyle=kro;
    ctx.beginPath(); ctx.ellipse(0,0,r,r*0.6,0,0,6.283); ctx.fill();
    // hoved
    ctx.beginPath(); ctx.arc(r*0.85,-r*0.32,r*0.42,0,6.283); ctx.fill();
    if(b.k==='oern'){ ctx.fillStyle='#f2efe6'; ctx.beginPath(); ctx.arc(r*0.85,-r*0.32,r*0.42,0,6.283); ctx.fill(); }
    if(b.k==='due' && t<0.5){ ctx.fillStyle='rgba(96,168,120,'+(0.8-t)+')'; ctx.beginPath(); ctx.arc(r*0.55,-r*0.18,r*0.2,0,6.283); ctx.fill(); }
    // naeb
    ctx.fillStyle = b.k==='krage' ? '#3a3f45' : (b.k==='oern' ? '#d9a02e' : '#e0a43e');
    ctx.beginPath(); ctx.moveTo(r*1.2,-r*0.36); ctx.lineTo(r*1.66,-r*0.2); ctx.lineTo(r*1.18,-r*0.08); ctx.closePath(); ctx.fill();
    // oeje
    ctx.fillStyle='#1a1d20'; ctx.beginPath(); ctx.arc(r*0.95,-r*0.4,Math.max(1.4,r*0.09),0,6.283); ctx.fill();
    // forvinge
    ctx.fillStyle=vin;
    ctx.beginPath(); ctx.moveTo(r*0.15,-r*0.12);
    ctx.quadraticCurveTo(-r*0.6, -r*0.15 - flap*r*1.15, -r*1.15, -r*0.25 - flap*r*1.5);
    ctx.quadraticCurveTo(-r*0.5, r*0.28 - flap*r*0.5, r*0.2, r*0.2); ctx.closePath(); ctx.fill();
    // kyrillisk maerke
    if(b.letter && t>0.85){
      ctx.fillStyle='#c0392b';
      ctx.font='bold '+Math.round(r*0.95)+"px 'Space Mono', monospace";
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.save(); ctx.scale(d,1); ctx.fillText(b.letter, d*(-r*0.15), -r*0.05); ctx.restore();
    }
    // drone-udstyr: rotorer, antenne, LED og landingsben
    if(b.drone){
      ctx.strokeStyle='#4a5055'; ctx.lineWidth=Math.max(1.5,r*0.1); ctx.lineCap='round';
      // to rotormaster
      [[-r*0.55,-r*0.45],[r*0.35,-r*0.5]].forEach(function(m,mi){
        ctx.beginPath(); ctx.moveTo(m[0],m[1]); ctx.lineTo(m[0],m[1]-r*0.55); ctx.stroke();
        // roterende propel (sloeret ellipse + streg)
        const pa=b.bob*4+mi*1.7, pl=r*0.62;
        ctx.strokeStyle='rgba(74,80,85,.35)';
        ctx.beginPath(); ctx.ellipse(m[0],m[1]-r*0.55,pl,pl*0.22,0,0,6.283); ctx.stroke();
        ctx.strokeStyle='#33383c';
        ctx.beginPath(); ctx.moveTo(m[0]-Math.cos(pa)*pl,m[1]-r*0.55-Math.sin(pa)*pl*0.22);
        ctx.lineTo(m[0]+Math.cos(pa)*pl,m[1]-r*0.55+Math.sin(pa)*pl*0.22); ctx.stroke();
        ctx.strokeStyle='#4a5055';
      });
      // antenne paa hovedet
      ctx.beginPath(); ctx.moveTo(r*0.85,-r*0.72); ctx.lineTo(r*0.85,-r*1.15); ctx.stroke();
      // blinkende LED
      const on = Math.floor(b.bob*1.6)%2===0;
      ctx.fillStyle= on ? '#e74c3c' : '#5a1f18';
      ctx.beginPath(); ctx.arc(r*0.85,-r*1.15,Math.max(1.6,r*0.11),0,6.283); ctx.fill();
      if(on){ ctx.fillStyle='rgba(231,76,60,.25)'; ctx.beginPath(); ctx.arc(r*0.85,-r*1.15,r*0.28,0,6.283); ctx.fill(); }
      // landingsben
      ctx.strokeStyle='#4a5055';
      ctx.beginPath(); ctx.moveTo(-r*0.35,r*0.5); ctx.lineTo(-r*0.35,r*0.85); ctx.moveTo(r*0.25,r*0.5); ctx.lineTo(r*0.25,r*0.85); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-r*0.5,r*0.85); ctx.lineTo(r*0.4,r*0.85); ctx.stroke();
    }
    ctx.restore();
  }

  /* ---------- Briefing ---------- */
  function briefing(){
    cancel();
    head.textContent = 'Operation Grå Vinge · briefing';
    const best = +(localStorage.getItem('graaVingeRekord')||0);
    app.innerHTML = `
      <div class="card">
        <div class="stamp">Fortroligt</div>
        <div class="meta">Freelance · Martin R. · sagsnr. 883/2004-B</div>
        <div class="country">Danmark</div>
        <h1 class="title">Operation Grå Vinge</h1>
        <p class="situation">Den fiktive spindoktor Martin R. har hyret dig til en yderst tvivlsom opgave. Konklusionen ligger allerede fast: der VAR russiske droner over Danmark. Der mangler kun én lille detalje, nemlig beviserne.</p>
        <div class="opgaver">
          <div class="opg"><b>OPGAVE A</b><span>Fang måger, duer og krager med et helt almindeligt, meget diskret net.</span></div>
          <div class="opg"><b>OPGAVE B</b><span>Mal dem diskret grå og stemp mystiske kyrilliske tegn på vingerne.</span></div>
          <div class="opg"><b>OPGAVE C</b><span>Montér rotorer, slip dem løs og skyd dem ned i beviskurven. Foto medfølger.</span></div>
        </div>
        <div class="advarsel">ADVARSEL: Rør IKKE havørnen. Den er fredet, og Dansk Ornitologisk Forening har flere advokater end vi har samvittighed.</div>
        <p class="situation" style="color:#6f6757;margin-top:12px">(Enhver lighed med virkelige efterretningsvurderinger er helt og aldeles utilsigtet.)</p>
        ${best?'<div class="best">Personlig rekord: <b>'+best+' uigendrivelige beviser</b></div>':''}
        <div class="actions">
          <button class="btn go big" id="start">Start operationen ▸</button>
        </div>
      </div>`;
    document.getElementById('start').onclick = game;
  }

  /* ---------- Spillet ---------- */
  function game(){
    cancel(); ac();
    head.textContent = 'Operation Grå Vinge';
    const W=660, H=400;
    app.innerHTML = `
      <div class="wrap">
        <div class="hud"><span id="phase">Trin 1: fang fuglene</span><span style="display:flex;gap:10px;align-items:center"><span id="stat"></span><button id="mute" title="Lyd til/fra">${snd.on?'\uD83D\uDD0A':'\uD83D\uDD07'}</button></span></div>
        <canvas class="spil" id="cv" width="${W}" height="${H}"></canvas>
      </div>`;
    const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
    const phaseEl=document.getElementById('phase'), statEl=document.getElementById('stat');
    document.getElementById('mute').onclick=function(){ snd.on=!snd.on; this.textContent=snd.on?'\uD83D\uDD0A':'\uD83D\uDD07'; };

    const TYPER=[
      {k:'maage',col:'#f2f4f6',wing:'#c3ccd2',r:17,fart:1.5},
      {k:'due',  col:'#9aa4ad',wing:'#7d8791',r:15,fart:1.1},
      {k:'krage',col:'#23272c',wing:'#15181c',r:16,fart:1.35}
    ];
    const clouds=[]; for(let i=0;i<5;i++) clouds.push({x:Math.random()*W,y:18+Math.random()*90,s:0.7+Math.random()*0.8});
    const waves=[]; for(let i=0;i<10;i++) waves.push({x:Math.random()*W,y:H-64+Math.random()*10,w:22+Math.random()*28,p:Math.random()*6.28});

    let phase='fang', last=performance.now(), tLeft=14, spawnT=0, oernT=3200,
        pointer={x:W/2,y:H/2}, lastFire=0, evidens=0, ended=false, malDone=0,
        intro=0, introTxt='', introQuip='', shake=0, flash=0, combo=0, comboT=0,
        netSwing=0, kurv=0;
    const birds=[], caught=[], flying=[], shots=[], booms=[], feathers=[], floats=[], skudt=[];
    const KX=W-92, KY=H-46; // beviskurvens placering (bund)

    function drawNet(x,y){
      const sw = netSwing>0 ? Math.sin(netSwing*3.1416)*0.7 : 0;
      ctx.save(); ctx.translate(x,y); ctx.rotate(0.5+sw);
      // skaft
      ctx.strokeStyle='#7a5a32'; ctx.lineWidth=5; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(24,24); ctx.lineTo(70,74); ctx.stroke();
      ctx.strokeStyle='#5c4224'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(24,24); ctx.lineTo(70,74); ctx.stroke();
      ctx.rotate(-0.5-sw);
      // ring
      ctx.strokeStyle='#8a8072'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(0,0,26,0,6.283); ctx.stroke();
      // masker
      ctx.save(); ctx.beginPath(); ctx.arc(0,0,25,0,6.283); ctx.clip();
      ctx.strokeStyle='rgba(239,233,220,.55)'; ctx.lineWidth=1;
      for(let i=-24;i<=24;i+=8){ ctx.beginPath(); ctx.moveTo(i,-26); ctx.lineTo(i,26); ctx.stroke(); ctx.beginPath(); ctx.moveTo(-26,i); ctx.lineTo(26,i); ctx.stroke(); }
      ctx.restore();
      ctx.restore();
    }
    function drawKurv(tid){
      // pil-flettet beviskurv paa jorden
      ctx.fillStyle='#8a6a38';
      ctx.beginPath(); ctx.moveTo(KX-40,KY-38); ctx.lineTo(KX+40,KY-38); ctx.lineTo(KX+32,KY); ctx.lineTo(KX-32,KY); ctx.closePath(); ctx.fill();
      ctx.strokeStyle='rgba(60,42,18,.55)'; ctx.lineWidth=1.4;
      for(let yy=KY-32;yy<KY-4;yy+=7){ const t=(yy-(KY-38))/38; const half=40-8*t; ctx.beginPath(); ctx.moveTo(KX-half,yy); ctx.lineTo(KX+half,yy); ctx.stroke(); }
      // fugledroner der stikker op af kurven
      const n=Math.min(3,kurv);
      for(let i=0;i<n;i++){
        const hx=KX-20+i*20, hy=KY-44;
        ctx.strokeStyle='#4a5055'; ctx.lineWidth=1.6;
        ctx.beginPath(); ctx.moveTo(hx,hy); ctx.lineTo(hx,hy-9); ctx.stroke();
        ctx.strokeStyle='rgba(74,80,85,.4)';
        ctx.beginPath(); ctx.ellipse(hx,hy-9,7,1.8,0,0,6.283); ctx.stroke();
        ctx.fillStyle='#8a9095'; ctx.beginPath(); ctx.arc(hx,hy+3,6,0,6.283); ctx.fill();
        ctx.fillStyle='#1a1d20'; ctx.beginPath(); ctx.arc(hx+2,hy+2,1.3,0,6.283); ctx.fill();
      }
      if(kurv>3){ ctx.fillStyle='#efe9dc'; ctx.font="700 11px 'Space Mono',monospace"; ctx.textAlign='center'; ctx.fillText('+'+(kurv-3), KX+30, KY-44); }
      // kant foran (saa fuglene forsvinder ned i kurven)
      ctx.fillStyle='#9a7842';
      ctx.beginPath(); ctx.ellipse(KX,KY-38,40,7,0,0,6.283); ctx.fill();
      ctx.fillStyle='#6e5228';
      ctx.beginPath(); ctx.ellipse(KX,KY-38,33,4.5,0,0,6.283); ctx.fill();
      // etiket
      ctx.fillStyle='#efe9dc'; ctx.fillRect(KX-18,KY-26,36,13);
      ctx.fillStyle='#c23b2e'; ctx.font="700 7px 'Space Mono',monospace"; ctx.textAlign='center';
      ctx.fillText('BEVISER', KX, KY-17);
    }

    function startIntro(txt,quip){ intro=1600; introTxt=txt; introQuip=quip; }
    function addFloat(x,y,txt,col,size){ floats.push({x:x,y:y,txt:txt,col:col||'#f4c64e',size:size||16,life:1}); }
    function burst(x,y,col,n){ for(let i=0;i<(n||8);i++) feathers.push({x:x,y:y,vx:(Math.random()-0.5)*2.6,vy:-Math.random()*2.2,sw:Math.random()*6.28,col:col,life:1}); }
    function doShake(v){ if(!reduceMotion) shake=Math.max(shake,v); }

    function pt(e){ const r=cv.getBoundingClientRect(); return {x:(e.clientX-r.left)*(W/r.width), y:(e.clientY-r.top)*(H/r.height)}; }

    function spawnBird(){
      const ty=TYPER[Math.floor(Math.random()*TYPER.length)];
      const l=Math.random()<0.5, sp=(ty.fart*0.85+Math.random()*ty.fart*0.6)*(l?1:-1);
      birds.push({k:ty.k,col:ty.col,wing:ty.wing,r:ty.r,x:l?-40:W+40,y:44+Math.random()*190,vx:sp,bob:Math.random()*6.28,paint:0});
    }
    function spawnOern(){
      const l=Math.random()<0.5;
      birds.push({k:'oern',col:'#6b4f33',wing:'#553d27',r:26,x:l?-60:W+60,y:56+Math.random()*120,vx:0.8*(l?1:-1),bob:Math.random()*6.28,paint:0});
    }

    /* --- baggrunde --- */
    function moelle(x,gy,s,dusk,tid){
      const c = dusk ? '#1c262c' : '#c9d6dd';
      ctx.strokeStyle=c; ctx.fillStyle=c; ctx.lineWidth=3*s; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(x,gy); ctx.lineTo(x,gy-64*s); ctx.stroke();
      ctx.save(); ctx.translate(x,gy-64*s); ctx.rotate(tid*0.0012);
      for(let i=0;i<3;i++){ ctx.rotate(2.094); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-30*s); ctx.stroke(); }
      ctx.restore();
      if(dusk){ ctx.fillStyle= (Math.floor(tid/700)%2)? '#e74c3c':'#5a1f18'; ctx.beginPath(); ctx.arc(x,gy-64*s,2.4*s,0,6.283); ctx.fill(); }
    }
    function drawCloud(x,y,s,dusk){ ctx.fillStyle= dusk ? 'rgba(200,212,222,.08)' : 'rgba(255,255,255,.75)'; ctx.beginPath(); ctx.ellipse(x,y,26*s,14*s,0,0,6.283); ctx.ellipse(x+20*s,y+4*s,20*s,11*s,0,0,6.283); ctx.ellipse(x-20*s,y+4*s,18*s,10*s,0,0,6.283); ctx.fill(); }
    function bgUde(dusk,tid){
      const g=ctx.createLinearGradient(0,0,0,H);
      if(dusk){ g.addColorStop(0,'#101b26'); g.addColorStop(.55,'#28333a'); g.addColorStop(1,'#3d4a44'); }
      else { g.addColorStop(0,'#8fb8d4'); g.addColorStop(.6,'#c6dde8'); g.addColorStop(1,'#dcebef'); }
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      if(dusk){ ctx.fillStyle='#e8e4d4'; ctx.beginPath(); ctx.arc(W-90,58,20,0,6.283); ctx.fill(); ctx.fillStyle='#28333a'; ctx.beginPath(); ctx.arc(W-98,52,17,0,6.283); ctx.fill();
        for(let i=0;i<24;i++){ const sx=(i*97)%W, sy=(i*53)%130+8; ctx.fillStyle='rgba(255,255,255,'+(0.25+((i*37)%40)/100)+')'; ctx.fillRect(sx,sy,1.6,1.6); } }
      else { ctx.fillStyle='rgba(255,244,200,.9)'; ctx.beginPath(); ctx.arc(W-84,56,22,0,6.283); ctx.fill(); }
      clouds.forEach(c=>{ if(!dusk){ c.x+=0.15; if(c.x>W+70)c.x=-70; } drawCloud(c.x,c.y,c.s,dusk); });
      // hav
      ctx.fillStyle= dusk ? '#1a2a30' : '#7aa8bd'; ctx.fillRect(0,H-78,W,32);
      ctx.strokeStyle= dusk ? 'rgba(180,210,220,.14)' : 'rgba(255,255,255,.55)'; ctx.lineWidth=1.6;
      waves.forEach(w=>{ const dy=Math.sin(tid*0.002+w.p)*1.6; ctx.beginPath(); ctx.moveTo(w.x,w.y+dy); ctx.quadraticCurveTo(w.x+w.w/2,w.y-3+dy,w.x+w.w,w.y+dy); ctx.stroke(); });
      // moeller paa horisonten
      moelle(70,H-78,0.8,dusk,tid); moelle(140,H-78,0.65,dusk,tid+400); moelle(210,H-78,0.72,dusk,tid+900);
      // land
      ctx.fillStyle = dusk ? '#243026' : '#6f9e5a'; ctx.fillRect(0,H-46,W,46);
      ctx.fillStyle = dusk ? '#1b2419' : '#5f8a4d'; ctx.fillRect(0,H-46,W,5);
    }
    function bgVaerksted(tid){
      const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#241d16'); g.addColorStop(1,'#3a2f22');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      // lampe
      ctx.strokeStyle='#171310'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,42); ctx.stroke();
      ctx.fillStyle='#2c251c'; ctx.beginPath(); ctx.moveTo(W/2-26,42); ctx.lineTo(W/2+26,42); ctx.lineTo(W/2+14,58); ctx.lineTo(W/2-14,58); ctx.closePath(); ctx.fill();
      const lg=ctx.createRadialGradient(W/2,60,10,W/2,60,330); lg.addColorStop(0,'rgba(255,228,150,.32)'); lg.addColorStop(1,'rgba(255,228,150,0)');
      ctx.fillStyle=lg; ctx.beginPath(); ctx.moveTo(W/2-14,58); ctx.lineTo(W/2-260,H); ctx.lineTo(W/2+260,H); ctx.lineTo(W/2+14,58); ctx.closePath(); ctx.fill();
      // arbejdsbord
      ctx.fillStyle='#5a4426'; ctx.fillRect(30,H-190,W-60,150);
      ctx.fillStyle='#4a3820'; ctx.fillRect(30,H-190,W-60,10);
      ctx.strokeStyle='rgba(0,0,0,.22)'; ctx.lineWidth=1;
      for(let x=60;x<W-40;x+=52){ ctx.beginPath(); ctx.moveTo(x,H-178); ctx.lineTo(x,H-44); ctx.stroke(); }
      ctx.fillStyle='#332a1c'; ctx.fillRect(0,H-40,W,40);
      // malerspand
      ctx.fillStyle='#7d8791'; ctx.fillRect(W-110,H-232,52,44);
      ctx.fillStyle='#8a9095'; ctx.beginPath(); ctx.ellipse(W-84,H-232,26,7,0,0,6.283); ctx.fill();
      ctx.fillStyle='#efe9dc'; ctx.fillRect(W-104,H-222,40,20);
      ctx.fillStyle='#2c2823'; ctx.font="8px 'Space Mono',monospace"; ctx.textAlign='center';
      ctx.fillText('GR\u00c5', W-84, H-213); ctx.fillText('NR. 5', W-84, H-205);
      // stempel
      ctx.fillStyle='#6e2b22'; ctx.fillRect(58,H-236,34,14); ctx.fillStyle='#3c2a20'; ctx.fillRect(70,H-250,10,16);
    }

    /* --- faser --- */
    function setPhase(p){
      phase=p; last=performance.now(); malDone=0;
      if(p==='fang'){ tLeft=14; phaseEl.textContent='Trin 1: fang fuglene med nettet';
        startIntro('TRIN 1: INDFANGNING','Martin R.: "En due i nettet er bedre end ti droner på taget."'); }
      else if(p==='mal'){ phaseEl.textContent='Trin 2: malerværkstedet';
        startIntro('TRIN 2: MALERVÆRKSTEDET','Martin R.: "Grå er sandhedens farve. Kyrillisk er detaljens sprog."');
        caught.forEach((b,i)=>{ const perR=Math.min(6,caught.length); b.dx=W/2+(i%perR - (Math.min(perR,caught.length)-1)/2)*88; b.dy=H-214+Math.floor(i/perR)*-84; b.x=b.dx; b.y=b.dy; b.face=1; b.paint=0; b.stage=0; b.letter=null; b.bob=Math.random()*6.28; }); }
      else if(p==='skyd'){ tLeft=14; phaseEl.textContent='Trin 3: bevissikring';
        startIntro('TRIN 3: BEVISSIKRING','Martin R.: "Jeg har monteret rotorer. Detaljen sælger historien."');
        caught.forEach(b=>{ const l=Math.random()<0.5; b.x=l?-40:W+40; b.y=44+Math.random()*170; b.vx=(1.35+Math.random()*1.15)*(l?1:-1); b.face=null; b.down=false; b.vy=0; b.spin=0; b.drone=true; flying.push(b); }); }
    }

    function updateFang(dt,tid){
      tLeft-=dt/1000; if(tLeft<0)tLeft=0;
      statEl.textContent='\u23f1 '+Math.ceil(tLeft)+' s \u00b7 fanget '+caught.length+'/12';
      spawnT-=dt; if(spawnT<=0){ spawnBird(); spawnT=430+Math.random()*340; }
      oernT-=dt; if(oernT<=0){ spawnOern(); oernT=5200+Math.random()*3000; }
      for(let i=birds.length-1;i>=0;i--){ const b=birds[i]; b.x+=b.vx*(dt/16); b.bob+=0.13; b.y+=Math.sin(b.bob)*0.4; if(b.x<-80||b.x>W+80) birds.splice(i,1); else drawBird(ctx,b); }
      if(netSwing>0) netSwing=Math.max(0,netSwing-dt/220);
      drawNet(pointer.x,pointer.y);
      if(tLeft<=0){ if(caught.length===0){ ended=true; report(0); } else setPhase('mal'); }
    }
    function updateMal(dt,tid){
      const done = caught.filter(b=>b.stage>=2).length;
      statEl.textContent='klargjort '+done+' / '+caught.length;
      caught.forEach(b=>{
        b.bob+=0.05; b.y=b.dy+Math.sin(b.bob)*1.2;
        if(b.stage<2){ ctx.strokeStyle='rgba(201,162,75,.55)'; ctx.lineWidth=1.6; ctx.setLineDash([4,4]); ctx.beginPath(); ctx.arc(b.dx,b.dy,b.r+11,0,6.283); ctx.stroke(); ctx.setLineDash([]);
          ctx.fillStyle='rgba(239,233,220,.8)'; ctx.font="10px 'Space Mono',monospace"; ctx.textAlign='center';
          ctx.fillText(b.stage===0?'tryk: mal':'tryk: stempl', b.dx, b.dy+b.r+24); }
        // glidende maling
        const maal = b.stage>=1 ? (b.stage>=2?1:0.55) : 0;
        if(b.paint<maal) b.paint=Math.min(maal,b.paint+dt/450);
        drawBird(ctx,b);
      });
      if(done===caught.length){ malDone+=dt; if(malDone>650) setPhase('skyd'); } else malDone=0;
    }
    function updateSkyd(dt,tid){
      tLeft-=dt/1000; if(tLeft<0)tLeft=0;
      statEl.textContent='\u23f1 '+Math.ceil(tLeft)+' s \u00b7 i kurven '+kurv;
      let up=0;
      for(let i=flying.length-1;i>=0;i--){ const b=flying[i];
        if(b.down){
          // bue-bane ned i beviskurven
          b.t+=dt/750; const t=Math.min(1,b.t);
          const cy=Math.min(b.sy,KY-38)-70;
          b.x=(1-t)*(1-t)*b.sx + 2*(1-t)*t*((b.sx+KX)/2) + t*t*KX;
          b.y=(1-t)*(1-t)*b.sy + 2*(1-t)*t*cy + t*t*(KY-46);
          b.spin+=0.18*(b.sx<KX?1:-1); b.bob+=0.25;
          if(t>=1){ kurv++; sPop(); burst(KX,KY-42,'#8a9095',6); booms.push({x:KX,y:KY-42,life:1,c:'#c8cdd0'}); flying.splice(i,1); continue; }
        } else { b.x+=b.vx*(dt/16); b.bob+=0.13; b.y+=Math.sin(b.bob)*0.4; if(b.x<-50)b.x=W+50; if(b.x>W+50)b.x=-50; up++; }
      }
      flying.forEach(b=>{ if(b.y<H+60) drawBird(ctx,b); });
      drawKurv(tid);
      // riffel der foelger sigtet
      const gx=W/2, gy=H-52, ang=Math.atan2(pointer.y-gy,pointer.x-gx);
      ctx.save(); ctx.translate(gx,gy); ctx.rotate(ang);
      ctx.fillStyle='#2f3a2c'; ctx.fillRect(0,-4,34,8); ctx.fillStyle='#1f2820'; ctx.fillRect(-12,-5,14,10);
      if(flash>0){ ctx.fillStyle='rgba(255,214,110,'+flash+')'; ctx.beginPath(); ctx.moveTo(34,0); ctx.lineTo(50,-7); ctx.lineTo(46,0); ctx.lineTo(50,7); ctx.closePath(); ctx.fill(); }
      ctx.restore();
      // sigtekorn
      ctx.strokeStyle='rgba(244,198,78,.9)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(pointer.x,pointer.y,10,0,6.283); ctx.moveTo(pointer.x-15,pointer.y); ctx.lineTo(pointer.x+15,pointer.y); ctx.moveTo(pointer.x,pointer.y-15); ctx.lineTo(pointer.x,pointer.y+15); ctx.stroke();
      if((tLeft<=0 && flying.every(b=>!b.down)) || flying.length===0){ ended=true; report(evidens); }
    }

    function frame(now){
      const dt=Math.min(50, now-last); last=now;
      ctx.save();
      if(shake>0){ ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake); shake=Math.max(0,shake-dt*0.05); }
      if(phase==='mal') bgVaerksted(now); else bgUde(phase==='skyd',now);

      if(intro>0){ intro-=dt; }
      const spilbar = intro<=1100;
      if(phase==='fang') updateFang(dt,now);
      else if(phase==='mal') updateMal(dt,now);
      else if(phase==='skyd') updateSkyd(dt,now);

      // tidslinje
      if(phase!=='mal'){ ctx.fillStyle='rgba(0,0,0,.25)'; ctx.fillRect(0,0,W,5); ctx.fillStyle='#c9a24b'; ctx.fillRect(0,0,W*(tLeft/14),5); }

      // skud, fjer, eksplosioner, tekster
      for(let i=shots.length-1;i>=0;i--){ const s=shots[i]; ctx.globalAlpha=Math.max(0,s.life); ctx.strokeStyle='#f4c64e'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(s.x1,s.y1); ctx.lineTo(s.x2,s.y2); ctx.stroke(); s.life-=dt/150; if(s.life<=0)shots.splice(i,1);} ctx.globalAlpha=1;
      for(let i=feathers.length-1;i>=0;i--){ const f=feathers[i]; f.vy+=0.05; f.x+=f.vx+Math.sin(f.sw)*0.6; f.y+=f.vy; f.sw+=0.2; ctx.globalAlpha=Math.max(0,f.life)*0.9; ctx.fillStyle=f.col; ctx.beginPath(); ctx.ellipse(f.x,f.y,4,2,f.sw,0,6.283); ctx.fill(); f.life-=dt/900; if(f.life<=0||f.y>H)feathers.splice(i,1);} ctx.globalAlpha=1;
      for(let i=booms.length-1;i>=0;i--){ const b=booms[i]; const rr=(1-b.life)*18+5; ctx.globalAlpha=Math.max(0,b.life)*0.85; ctx.fillStyle=b.c; ctx.beginPath(); ctx.arc(b.x,b.y,rr,0,6.283); ctx.fill(); b.life-=dt/320; if(b.life<=0)booms.splice(i,1);} ctx.globalAlpha=1;
      for(let i=floats.length-1;i>=0;i--){ const f=floats[i]; f.y-=dt*0.035; ctx.globalAlpha=Math.max(0,f.life); ctx.fillStyle=f.col; ctx.font="700 "+f.size+"px 'Oswald',sans-serif"; ctx.textAlign='center'; ctx.fillText(f.txt,f.x,f.y); f.life-=dt/1100; if(f.life<=0)floats.splice(i,1);} ctx.globalAlpha=1;
      if(flash>0) flash=Math.max(0,flash-dt/70);
      if(comboT>0) comboT-=dt; else combo=0;

      // fase-intro
      if(intro>0){
        const a=Math.min(1,intro/400);
        ctx.fillStyle='rgba(10,15,20,'+(0.55*a)+')'; ctx.fillRect(0,0,W,H);
        ctx.globalAlpha=a; ctx.textAlign='center';
        ctx.fillStyle='#efe9dc'; ctx.font="700 34px 'Oswald',sans-serif"; ctx.fillText(introTxt, W/2, H/2-10);
        ctx.fillStyle='#c9a24b'; ctx.font="13px 'Space Mono',monospace"; ctx.fillText(introQuip, W/2, H/2+22);
        ctx.globalAlpha=1;
      }
      ctx.restore();
      if(ended) return;
      RAF=requestAnimationFrame(frame);
    }

    cv.addEventListener('pointerdown', e=>{ const p=pt(e); pointer=p; ac();
      if(intro>1100) return;
      if(phase==='fang'){
        netSwing=1; noise(.09,.08,true);
        for(let i=0;i<birds.length;i++){ const b=birds[i];
          if(Math.hypot(b.x-p.x,b.y-p.y)<b.r+14){
            if(b.k==='oern'){
              sAlarm(); doShake(9); burst(b.x,b.y,'#6b4f33',10); birds.splice(i,1);
              addFloat(b.x,b.y-20,'FREDET! DOF ER UNDERRETTET','#e74c3c',15);
              const tab=Math.min(2,caught.length); for(let j=0;j<tab;j++) caught.pop();
              if(tab>0) addFloat(W/2,70, tab+' fugl(e) flygtede i forvirringen','#efe9dc',13);
            } else {
              sPop(); caught.push({k:b.k,col:b.col,wing:b.wing,r:b.r,bob:0,paint:0});
              booms.push({x:b.x,y:b.y,life:1,c:'#ffffff'}); burst(b.x,b.y,b.wing,7);
              addFloat(b.x,b.y-18,'+1','#f4c64e',15);
              birds.splice(i,1); if(caught.length>=12) tLeft=0;
            }
            break;
          } }
      } else if(phase==='mal'){
        for(let i=0;i<caught.length;i++){ const b=caught[i];
          if(b.stage<2 && Math.hypot(b.dx-p.x,b.dy-p.y)<b.r+18){
            if(b.stage===0){ b.stage=1; sSpray(); for(let j=0;j<10;j++) feathers.push({x:b.dx+(Math.random()-0.5)*26,y:b.dy+(Math.random()-0.5)*20,vx:(Math.random()-0.5)*1.2,vy:-Math.random()*0.8,sw:Math.random()*6.28,col:'#9aa0a4',life:0.7}); }
            else { b.stage=2; b.letter=KYR[Math.floor(Math.random()*KYR.length)]; sStamp(); doShake(6); booms.push({x:b.dx,y:b.dy,life:1,c:'#c0392b'}); addFloat(b.dx,b.dy-b.r-14,b.letter,'#c0392b',20); }
            break;
          } }
      } else if(phase==='skyd'){
        const now=performance.now(); if(now-lastFire<140) return; lastFire=now;
        sSkud(); flash=1; doShake(4);
        const gx=W/2, gy=H-52;
        shots.push({x1:gx,y1:gy,x2:p.x,y2:p.y,life:1});
        let hi=-1,hd=1e9; flying.forEach((b,i)=>{ if(!b.down){ const d=Math.hypot(b.x-p.x,b.y-p.y); if(d<b.r+15&&d<hd){hd=d;hi=i;} } });
        if(hi>=0){ const b=flying[hi]; b.down=true; b.t=0; b.sx=b.x; b.sy=b.y; evidens++; skudt.push(b.letter||'\u0416');
          sHit(); doShake(7); booms.push({x:b.x,y:b.y,life:1,c:'#c0392b'}); burst(b.x,b.y,'#8a9095',10);
          if(now-comboT<0 || comboT>0){ combo++; } else combo=1; comboT=1200;
          addFloat(b.x,b.y-20, combo>1 ? 'SERIEBEVIS x'+combo : '+1 BEVIS', combo>1?'#e74c3c':'#f4c64e', combo>1?18:15);
        }
      }
    });
    cv.addEventListener('pointermove', e=>{ pointer=pt(e); });

    window.__gvSkudt = skudt;
    setPhase('fang');
    RAF=requestAnimationFrame(frame);
  }

  /* ---------- Rapport ---------- */
  function rang(n){
    if(n<=0)  return 'Praktikant i sandhed';
    if(n<=3)  return 'Assisterende faktafordrejer';
    if(n<=7)  return 'Seniorspinkonsulent';
    if(n<=11) return 'Chef for alternative fakta';
    return 'Statsministerens yndlingskilde';
  }
  const CITATER=[
    ['Jeg har set billederne. Jeg har også set en måge før. Det her er IKKE en måge.','Anonym kilde tæt på sagen'],
    ['Vingemarkeringerne taler deres eget tydelige sprog. Vi ved bare ikke hvilket.','Ekspert, ønsker ikke navn i pressen'],
    ['Metadataene er desværre slettet af hensyn til rigets sikkerhed. Meget belejligt, ja. Meget sikkert, også.','Presseafdelingen'],
    ['Samme fugl blev observeret over Kreml i 2019. Eller en der lignede. De ligner alle sammen hinanden.','Uafhængig fugleanalytiker']
  ];
  const KAPTIONER=[
    'Foto ##: bemærk rotorerne. Fugle har ikke rotorer.',
    'Foto ##: zoom selv ind. Længere er den ikke.',
    'Foto ##: ekspert bekræfter, det er ikke en måge.',
    'Foto ##: kilde anonym, men meget troværdig.',
    'Foto ##: helt almindelig droneadfærd.',
    'Foto ##: metadata slettet, konklusion bevaret.'
  ];
  function tegnFoto(cv,letter,seed){
    const c=cv.getContext('2d'), w=cv.width, h=cv.height;
    const g=c.createLinearGradient(0,0,0,h); g.addColorStop(0,'#152029'); g.addColorStop(1,'#33413a');
    c.fillStyle=g; c.fillRect(0,0,w,h);
    c.fillStyle='#e8e4d4'; c.beginPath(); c.arc(w-20,16,8,0,6.283); c.fill();
    const b={x:w/2+((seed*13)%14-7), y:h/2+2, r:14, vx:(seed%2? -1:1), bob:seed, col:'#f2f4f6', wing:'#c3ccd2', paint:1, letter:letter, k:'maage', drone:true};
    drawBird(c,b);
    // roed ring + pil
    c.strokeStyle='#e74c3c'; c.lineWidth=2;
    c.beginPath(); c.ellipse(b.x,b.y,26,19,0.2,0,6.283); c.stroke();
    c.beginPath(); c.moveTo(w-14,h-12); c.lineTo(b.x+20,b.y+12); c.stroke();
    c.beginPath(); c.moveTo(b.x+20,b.y+12); c.lineTo(b.x+30,b.y+13); c.moveTo(b.x+20,b.y+12); c.lineTo(b.x+27,b.y+21); c.stroke();
    // korn
    for(let i=0;i<260;i++){ c.fillStyle='rgba(255,255,255,'+(Math.random()*0.06)+')'; c.fillRect(Math.random()*w,Math.random()*h,1,1); }
    // tidsstempel
    c.fillStyle='#f4c64e'; c.font="8px 'Space Mono',monospace"; c.textAlign='left';
    c.fillText('26-06-2026 04:1'+(seed%10)+' UTC', 5, h-5);
  }

  function report(count){
    cancel();
    head.textContent = 'Operation Grå Vinge · rapport';
    const best = Math.max(count, +(localStorage.getItem('graaVingeRekord')||0));
    const nyRekord = count>0 && count>=best && count> +(localStorage.getItem('graaVingeRekord')||0);
    localStorage.setItem('graaVingeRekord', best);
    sFanfare(count>0);

    let body, stamp, farve;
    if(count>0){
      farve='var(--red)'; stamp='Uigendriveligt';
      body='Du leverede '+count+' grå fugledroner med kyrilliske vingemarkeringer og rotorer, behørigt nedskudt over dansk jord, samlet i en beviskurv og fotograferet i dårligt lys, som beviser skal. Martin R. sender billederne videre til statsministeren med teksten: se selv. Konklusionen stod skrevet på forhånd, nu har den både fjer og propeller. Ingen spurgte, om en måge kan flyve fra Moskva.';
    } else {
      farve='#8f8675'; stamp='Uden bevis';
      body='Du fangede ingen fugle. Uden gråmalede måger står Martin R. tilbage med en teori, en tom fotomappe og en meget lang forklaring. Sagen forbliver, pinligt nok, kun en påstand.';
    }
    const cit = CITATER[Math.min(CITATER.length-1, Math.floor(Math.random()*CITATER.length))];
    const skudt = (window.__gvSkudt||[]).slice(0,6);

    app.innerHTML = `
      <div class="card">
        <div class="stamp" style="color:${farve};border-color:${farve}">${stamp}</div>
        <div class="meta">Operation Grå Vinge · rapport · sagsnr. 883/2004-B</div>
        <div class="country">Danmark</div>
        <h1 class="title">Beviserne er klar</h1>
        <div class="verdict" style="color:${farve}"><span class="dot" style="background:${farve}"></span>${count>0 ? count+' uigendrivelige beviser' : 'Ingen beviser'}</div>
        <div class="rang">Rang: ${rang(count)}</div>
        <p class="situation">${body}</p>
        ${count>0?`<div class="fotos" id="fotos"></div>`:''}
        ${count>0?`<div class="citat">"${cit[0]}"<span>${cit[1]}</span></div>`:''}
        <div class="best">${nyRekord?'NY PERSONLIG REKORD: ':'Personlig rekord: '}<b>${best} beviser</b></div>
        <div class="actions">
          <button class="btn go big" id="again">Kør igen ▸</button>
          <button class="btn big" id="back">Til briefing ▸</button>
        </div>
      </div>`;
    if(count>0){
      const holder=document.getElementById('fotos');
      skudt.forEach((letter,i)=>{
        const f=document.createElement('div'); f.className='foto';
        f.style.setProperty('--rot',((i*47)%9-4)+'deg');
        const c=document.createElement('canvas'); c.width=114; c.height=100;
        const p=document.createElement('p'); p.textContent=KAPTIONER[i%KAPTIONER.length].replace('##',(i+1));
        f.appendChild(c); f.appendChild(p); holder.appendChild(f);
        tegnFoto(c,letter,i+3);
      });
    }
    document.getElementById('again').onclick = game;
    document.getElementById('back').onclick = briefing;
  }

  briefing();
})();
</script>
</body>
</html>
