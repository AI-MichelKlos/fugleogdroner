<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#07091e">
<title>Nova & Luna – Stjerneruten</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{
    margin:0;width:100%;height:100%;overflow:hidden;
    background:#050719;color:white;
    font-family:ui-rounded,"SF Pro Rounded","Arial Rounded MT Bold",system-ui,sans-serif;
    touch-action:none;overscroll-behavior:none;
  }
  #gameWrap{position:fixed;inset:0;background:#050719}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}
  #hud{
    position:absolute;z-index:5;left:0;right:0;top:0;
    padding:max(8px,env(safe-area-inset-top)) max(14px,env(safe-area-inset-right)) 8px max(14px,env(safe-area-inset-left));
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    pointer-events:none;
    background:linear-gradient(180deg,rgba(3,5,22,.84),rgba(3,5,22,.24),transparent);
  }
  #levelName{
    font-size:clamp(14px,2vw,22px);font-weight:950;
    text-shadow:0 2px 10px rgba(0,0,0,.55)
  }
  #hudCenter{
    min-width:215px;text-align:center;font-size:clamp(12px,1.7vw,18px);font-weight:900;
    text-shadow:0 2px 10px rgba(0,0,0,.55)
  }
  #shield{
    font-size:clamp(15px,2vw,21px);letter-spacing:2px;
    filter:drop-shadow(0 2px 7px rgba(0,0,0,.6))
  }
  #startPanel{
    position:absolute;z-index:10;inset:0;
    display:grid;place-items:center;text-align:center;padding:24px;
    background:linear-gradient(180deg,rgba(4,6,25,.12),rgba(4,6,25,.5));
  }
  #startCard{
    width:min(620px,88vw);padding:26px 30px;border-radius:30px;
    background:rgba(11,15,54,.62);border:1px solid rgba(255,255,255,.18);
    backdrop-filter:blur(14px);box-shadow:0 24px 80px rgba(0,0,0,.38);
  }
  #startCard h1{
    margin:0 0 8px;font-size:clamp(34px,5.3vw,68px);line-height:.98;
    background:linear-gradient(90deg,#ff9dce,#fff1a1,#8cecff);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  #startCard p{margin:9px 0;font-size:clamp(15px,2vw,21px);font-weight:800;line-height:1.35}
  .small{opacity:.78;font-size:clamp(12px,1.5vw,16px)!important}
  .action{
    margin-top:16px;border:0;border-radius:999px;padding:15px 28px;
    color:#26204a;background:linear-gradient(180deg,#fff5a7,#ffd44f);
    font-size:18px;font-weight:950;letter-spacing:.4px;
    box-shadow:0 7px 0 #b77e1b,0 13px 28px rgba(0,0,0,.3);
  }
  .action:active{transform:translateY(4px);box-shadow:0 3px 0 #b77e1b,0 8px 18px rgba(0,0,0,.25)}
  #tip{
    position:absolute;z-index:6;left:50%;bottom:max(14px,env(safe-area-inset-bottom));
    transform:translateX(-50%);padding:9px 15px;border-radius:999px;
    background:rgba(5,8,30,.64);border:1px solid rgba(255,255,255,.16);
    backdrop-filter:blur(10px);font-size:clamp(12px,1.55vw,16px);font-weight:850;
    white-space:nowrap;pointer-events:none;transition:opacity .25s;
  }
  #rotate{
    display:none;position:fixed;z-index:100;inset:0;place-items:center;text-align:center;padding:28px;
    background:radial-gradient(circle at 50% 30%,#2d347e,#090b2e 62%,#050719);
  }
  #rotate div{
    max-width:420px;padding:28px;border-radius:28px;background:rgba(255,255,255,.09);
    border:1px solid rgba(255,255,255,.17)
  }
  #rotate b{display:block;font-size:64px;animation:turn 1.8s ease-in-out infinite}
  #rotate h2{font-size:28px;margin:12px 0 6px}
  #rotate p{margin:0;opacity:.82;font-weight:750}
  @keyframes turn{0%,25%{transform:rotate(0)}65%,100%{transform:rotate(90deg)}}
  @media (orientation:portrait){#gameWrap{display:none}#rotate{display:grid}}
</style>
</head>
<body>
<div id="gameWrap">
  <canvas id="game" aria-label="Mobilspil med Nova og Luna"></canvas>

  <div id="hud">
    <div id="levelName">Nova & Luna</div>
    <div id="hudCenter">Tryk START</div>
    <div id="shield">💛💛💛</div>
  </div>

  <div id="tip">Træk fingeren på skærmen for at styre raketten</div>

  <div id="startPanel">
    <div id="startCard">
      <h1>Stjerneruten</h1>
      <p>Tre rumverdener. Én raket. To søstre.</p>
      <p class="small">Nova og Luna sidder sammen i cockpittet. Træk fingeren rundt på skærmen, så følger raketten efter.</p>
      <button id="startBtn" class="action">START EVENTYRET</button>
    </div>
  </div>
</div>

<div id="rotate">
  <div>
    <b>📱</b>
    <h2>Drej telefonen vandret</h2>
    <p>Spillet er bygget til liggende mobilskærm.</p>
  </div>
</div>

<script>
(()=>{
'use strict';

const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const wrap=document.getElementById('gameWrap');
const startPanel=document.getElementById('startPanel');
const startCard=document.getElementById('startCard');
const startBtn=document.getElementById('startBtn');
const levelNameEl=document.getElementById('levelName');
const hudCenter=document.getElementById('hudCenter');
const shieldEl=document.getElementById('shield');
const tip=document.getElementById('tip');

const W=1280,H=720;
let dpr=1,viewScale=1,ox=0,oy=0;
let last=0,time=0,state='menu',levelIndex=0;
let shield=3,score=0,progress=0,invincible=0,shake=0,flash=0;
let target={x:300,y:360,down:false};
let message='',messageUntil=0;
let rocket={x:200,y:330,w:164,h:84,vx:0,vy:0,trail:[]};
let hazards=[],pickups=[],particles=[];
let audio=null;

const stars=Array.from({length:210},()=>({
  x:Math.random()*W,y:Math.random()*H,r:.6+Math.random()*2.1,z:.25+Math.random()*.95,p:Math.random()*6.28
}));

const LEVELS=[
  {
    name:'Bane 1 · Asteroidebæltet',
    short:'Asteroidebæltet',
    goal:5,
    speed:235,
    length:100,
    pickup:'stjerner',
    message:'Saml 5 stjerner og flyv sikkert gennem asteroiderne.',
    colors:['#090b31','#16195a','#28175b'],
    planet:{x:1120,y:120,r:95,c1:'#d66a74',c2:'#ffbf7d',ring:true},
    hazard:'asteroid'
  },
  {
    name:'Bane 2 · Krystaltågen',
    short:'Krystaltågen',
    goal:6,
    speed:255,
    length:115,
    pickup:'krystaller',
    message:'Saml 6 krystaller i den lysende tåge.',
    colors:['#071a34','#143f68','#502268'],
    planet:{x:1080,y:560,r:130,c1:'#3a9fd3',c2:'#80f4d1',ring:false},
    hazard:'cloud'
  },
  {
    name:'Bane 3 · Kometstormen',
    short:'Kometstormen',
    goal:7,
    speed:285,
    length:130,
    pickup:'fyrlys',
    message:'Saml 7 fyrlys og nå frem til stjernefyret.',
    colors:['#12051f','#381148','#691c3d'],
    planet:{x:1100,y:125,r:78,c1:'#7948c5',c2:'#ff75b5',ring:true},
    hazard:'comet'
  }
];

const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const rand=(a,b)=>a+Math.random()*(b-a);

function resize(){
  const r=wrap.getBoundingClientRect();
  dpr=Math.min(2,window.devicePixelRatio||1);
  canvas.width=Math.max(1,Math.round(r.width*dpr));
  canvas.height=Math.max(1,Math.round(r.height*dpr));
  viewScale=Math.min(r.width/W,r.height/H);
  ox=(r.width-W*viewScale)/2;
  oy=(r.height-H*viewScale)/2;
}
addEventListener('resize',resize,{passive:true});
resize();

function worldPoint(e){
  const r=canvas.getBoundingClientRect();
  return {
    x:clamp(((e.clientX-r.left)-ox)/viewScale,0,W),
    y:clamp(((e.clientY-r.top)-oy)/viewScale,0,H)
  };
}

function initAudio(){
  if(audio)return;
  try{audio=new (window.AudioContext||window.webkitAudioContext)()}catch(_){}
}
function tone(freq,dur=.08,type='sine',vol=.035){
  initAudio();if(!audio)return;
  const o=audio.createOscillator(),g=audio.createGain(),now=audio.currentTime;
  o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(vol,now);
  g.gain.exponentialRampToValueAtTime(.001,now+dur);
  o.connect(g);g.connect(audio.destination);o.start(now);o.stop(now+dur);
}
function collectSound(){tone(840,.08);setTimeout(()=>tone(1160,.09,'sine',.028),45)}
function hitSound(){tone(125,.13,'sawtooth',.03)}

function showMessage(text,seconds=2.4){
  message=text;messageUntil=time+seconds;
}

function setCard(title,text,button){
  startCard.innerHTML=`<h1>${title}</h1><p>${text}</p><button id="dynamicBtn" class="action">${button}</button>`;
  document.getElementById('dynamicBtn').addEventListener('pointerdown',e=>{
    e.preventDefault();
    if(state==='levelComplete')beginLevel(levelIndex+1);
    else if(state==='gameComplete')beginLevel(0);
    else if(state==='failed')beginLevel(levelIndex);
  },{once:true});
}

function beginLevel(index){
  levelIndex=index;
  const L=LEVELS[levelIndex];
  state='playing';shield=3;score=0;progress=0;invincible=0;shake=0;flash=0;
  rocket={x:180,y:330,w:164,h:84,vx:0,vy:0,trail:[]};
  target={x:rocket.x+rocket.w*.5,y:rocket.y+rocket.h*.5,down:false};
  hazards=[];pickups=[];particles=[];
  for(let i=0;i<10;i++)hazards.push(makeHazard(660+i*190+rand(0,130)));
  for(let i=0;i<L.goal+3;i++)pickups.push(makePickup(520+i*250+rand(0,120)));
  startPanel.style.display='none';
  tip.style.opacity='1';
  showMessage(L.message,3.2);
  updateHud();
  tone(540,.08);setTimeout(()=>tone(760,.1),60);
}

function makeHazard(x){
  const type=LEVELS[levelIndex].hazard;
  return {
    type,x,y:rand(105,635),
    r:type==='asteroid'?rand(31,57):type==='cloud'?rand(38,62):rand(25,42),
    rot:rand(0,6.28),spin:rand(-1,1),
    vy:type==='comet'?rand(-28,28):0,
    phase:rand(0,6.28)
  };
}
function makePickup(x){
  return {x,y:rand(100,625),r:18,phase:rand(0,6.28),taken:false};
}

function updateHud(){
  if(state==='playing'){
    const L=LEVELS[levelIndex];
    levelNameEl.textContent=L.name;
    hudCenter.textContent=`${L.pickup[0].toUpperCase()+L.pickup.slice(1)} ${score}/${L.goal} · Rute ${Math.floor(progress)}%`;
    shieldEl.textContent='💛'.repeat(shield)+'🖤'.repeat(3-shield);
  }else if(state==='menu'){
    levelNameEl.textContent='Nova & Luna';
    hudCenter.textContent='Tryk START';
    shieldEl.textContent='💛💛💛';
  }
}

startBtn.addEventListener('pointerdown',e=>{
  e.preventDefault();initAudio();
  if(document.documentElement.requestFullscreen)document.documentElement.requestFullscreen().catch(()=>{});
  beginLevel(0);
},{once:true});

canvas.addEventListener('pointerdown',e=>{
  e.preventDefault();initAudio();
  const p=worldPoint(e);target.down=true;target.x=p.x;target.y=p.y;
  canvas.setPointerCapture?.(e.pointerId);
});
canvas.addEventListener('pointermove',e=>{
  if(!target.down)return;
  e.preventDefault();
  const p=worldPoint(e);target.x=p.x;target.y=p.y;
});
function release(e){
  target.down=false;
  try{canvas.releasePointerCapture?.(e.pointerId)}catch(_){}
}
canvas.addEventListener('pointerup',release);
canvas.addEventListener('pointercancel',release);

function update(dt){
  time+=dt;
  const starSpeed=state==='playing'?LEVELS[levelIndex].speed*.22:28;
  stars.forEach(s=>{
    s.x-=starSpeed*s.z*dt;
    if(s.x<-4){s.x=W+4;s.y=rand(0,H)}
  });
  particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;p.vx*=.98;p.vy*=.98});
  particles=particles.filter(p=>p.life>0);
  if(shake>0)shake=Math.max(0,shake-dt*4);
  if(flash>0)flash=Math.max(0,flash-dt*3);
  if(state!=='playing')return;

  const L=LEVELS[levelIndex];
  progress+=dt*(100/L.length);
  invincible=Math.max(0,invincible-dt);

  if(target.down){
    const tx=clamp(target.x-rocket.w*.48,24,W-rocket.w-26);
    const ty=clamp(target.y-rocket.h*.5,55,H-rocket.h-32);
    const follow=1-Math.pow(.0015,dt);
    rocket.x=lerp(rocket.x,tx,follow);
    rocket.y=lerp(rocket.y,ty,follow);
  }

  rocket.trail.push({x:rocket.x+8,y:rocket.y+rocket.h*.52,life:1,size:rand(10,22)});
  if(rocket.trail.length>50)rocket.trail.shift();
  rocket.trail.forEach(p=>p.life-=dt*2.2);

  hazards.forEach(h=>{
    h.x-=L.speed*dt;
    h.y+=h.vy*dt;
    h.rot+=h.spin*dt;
    h.phase+=dt;
    if(h.y<75||h.y>655)h.vy*=-1;
    if(h.x<-100)Object.assign(h,makeHazard(W+rand(180,520)));
    if(invincible<=0&&circleRect(h.x,h.y,h.r,rocket.x+7,rocket.y+8,rocket.w-14,rocket.h-16)){
      hitHazard(h);
    }
  });

  pickups.forEach(p=>{
    p.x-=L.speed*dt;p.phase+=dt*2.2;
    if(p.x<-40&&!p.taken)Object.assign(p,makePickup(W+rand(180,550)));
    if(!p.taken&&circleRect(p.x,p.y,p.r+7,rocket.x,rocket.y,rocket.w,rocket.h)){
      p.taken=true;score++;collectSound();flash=.28;
      burst(p.x,p.y,LEVELS[levelIndex].hazard==='cloud'?'#7deaff':'#ffe47a');
      showMessage(score>=L.goal?'Målet er nået — hold kursen!':'Flot samlet!',.8);
      Object.assign(p,makePickup(W+rand(320,650)));
    }
  });

  if(progress>=100){
    if(score>=L.goal)completeLevel();
    else{
      progress=84;
      showMessage(`I mangler ${L.goal-score} ${L.pickup}. Fortsæt lidt endnu!`,2);
    }
  }
  updateHud();
}

function hitHazard(h){
  shield--;invincible=1.15;shake=1;flash=1;hitSound();
  if(navigator.vibrate)navigator.vibrate(70);
  burst(h.x,h.y,'#ff7aa9');
  Object.assign(h,makeHazard(W+rand(260,620)));
  if(shield<=0){
    state='failed';tip.style.opacity='0';
    startPanel.style.display='grid';
    setCard('Raketten skal repareres','Rumrobotten har allerede fundet værktøjet. Prøv banen igen.','PRØV IGEN');
  }else{
    showMessage('Pas på — skjoldet blev ramt!',1.25);
  }
}

function completeLevel(){
  state=levelIndex===LEVELS.length-1?'gameComplete':'levelComplete';
  tip.style.opacity='0';
  startPanel.style.display='grid';
  if(state==='gameComplete'){
    setCard('Stjernefyret lyser!','Nova og Luna gennemførte alle tre rumverdener sammen.','SPIL IGEN');
    tone(660,.12);setTimeout(()=>tone(880,.12),90);setTimeout(()=>tone(1180,.16),180);
  }else{
    const next=LEVELS[levelIndex+1];
    setCard('Bane gennemført!',`Næste rumverden er ${next.short}.`,'NÆSTE BANE');
    tone(620,.1);setTimeout(()=>tone(900,.12),75);
  }
}

function burst(x,y,color){
  for(let i=0;i<18;i++){
    const a=rand(0,Math.PI*2),s=rand(55,175);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rand(.35,.8),r:rand(2,5),color});
  }
}
function circleRect(cx,cy,r,rx,ry,rw,rh){
  const nx=clamp(cx,rx,rx+rw),ny=clamp(cy,ry,ry+rh);
  return (cx-nx)**2+(cy-ny)**2<r*r;
}

function beginDraw(){
  const r=wrap.getBoundingClientRect();
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,r.width,r.height);
  ctx.save();
  ctx.translate(ox+(shake?rand(-7,7)*shake:0),oy+(shake?rand(-4,4)*shake:0));
  ctx.scale(viewScale,viewScale);
}
function endDraw(){
  if(flash>0){ctx.fillStyle=`rgba(255,255,255,${flash*.2})`;ctx.fillRect(0,0,W,H)}
  ctx.restore();
}
function draw(){
  beginDraw();
  drawBackground();
  if(state==='menu')drawMenuScene();
  else{
    drawTrail();
    hazards.forEach(drawHazard);
    pickups.forEach(drawPickup);
    drawRocket(rocket.x,rocket.y,1);
    particles.forEach(drawParticle);
    if(target.down&&state==='playing')drawFingerTarget();
    if(message&&time<messageUntil)drawMessage(message);
  }
  endDraw();
}

function drawBackground(){
  const C=LEVELS[levelIndex]?.colors||['#090b31','#16195a','#28175b'];
  const g=ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0,C[0]);g.addColorStop(.58,C[1]);g.addColorStop(1,C[2]);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  const fog1=ctx.createRadialGradient(220,120,0,220,120,300);
  fog1.addColorStop(0,'rgba(119,98,255,.16)');fog1.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=fog1;ctx.beginPath();ctx.arc(220,120,300,0,Math.PI*2);ctx.fill();

  const fog2=ctx.createRadialGradient(960,520,0,960,520,360);
  fog2.addColorStop(0,levelIndex===1?'rgba(86,230,255,.15)':'rgba(255,98,177,.12)');
  fog2.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=fog2;ctx.beginPath();ctx.arc(960,520,360,0,Math.PI*2);ctx.fill();

  stars.forEach(s=>{
    ctx.globalAlpha=.35+.65*Math.sin(time*(.8+s.z)+s.p)**2;
    ctx.fillStyle=s.z>.75?'#fff8cf':'#dce6ff';
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  const P=LEVELS[levelIndex]?.planet||{x:1090,y:120,r:95,c1:'#d66a74',c2:'#ffbf7d',ring:true};
  drawPlanet(P);
  if(levelIndex===1)drawNebulaRibbons();
  if(levelIndex===2)drawDistantBeacon();
}

function drawMenuScene(){
  drawRocket(475,285,1.8);
  ctx.textAlign='center';
  ctx.fillStyle='rgba(255,255,255,.82)';
  ctx.font='850 20px ui-rounded,system-ui';
  ctx.fillText('Nova og Luna er klar i cockpittet',W/2,560);
}

function drawNebulaRibbons(){
  ctx.save();ctx.globalAlpha=.18;
  ctx.strokeStyle='#8cf1ff';ctx.lineWidth=44;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-80,570);ctx.bezierCurveTo(280,370,530,700,900,480);ctx.stroke();
  ctx.strokeStyle='#ff86c2';ctx.lineWidth=24;
  ctx.beginPath();ctx.moveTo(240,-20);ctx.bezierCurveTo(420,190,760,40,1080,280);ctx.stroke();
  ctx.restore();
}
function drawDistantBeacon(){
  ctx.save();ctx.translate(1120,430);
  const beam=ctx.createLinearGradient(0,-260,0,0);
  beam.addColorStop(0,'rgba(255,239,151,0)');beam.addColorStop(1,'rgba(255,239,151,.22)');
  ctx.fillStyle=beam;ctx.beginPath();ctx.moveTo(-60,0);ctx.lineTo(0,-270);ctx.lineTo(60,0);ctx.closePath();ctx.fill();
  ctx.fillStyle='#ffe47a';ctx.beginPath();ctx.arc(0,0,13,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawTrail(){
  rocket.trail.filter(p=>p.life>0).forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life)*.66;
    const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size);
    g.addColorStop(0,'#fff8bd');g.addColorStop(.35,'#ff9d61');g.addColorStop(1,'rgba(255,85,169,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawRocket(x,y,s=1){
  ctx.save();ctx.translate(x,y);ctx.scale(s,s);
  const flame=ctx.createLinearGradient(-32,0,16,0);
  flame.addColorStop(0,'rgba(255,66,163,0)');flame.addColorStop(.5,'#ff67a8');flame.addColorStop(1,'#fff0a1');
  ctx.fillStyle=flame;ctx.beginPath();ctx.moveTo(10,28);ctx.quadraticCurveTo(-40,42,10,57);ctx.closePath();ctx.fill();

  ctx.fillStyle='#ff79b8';
  ctx.beginPath();ctx.moveTo(54,66);ctx.lineTo(24,91);ctx.lineTo(84,68);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(54,18);ctx.lineTo(27,-5);ctx.lineTo(85,17);ctx.closePath();ctx.fill();

  const body=ctx.createLinearGradient(15,8,145,75);
  body.addColorStop(0,'#ffffff');body.addColorStop(.55,'#deebff');body.addColorStop(1,'#9fb3df');
  ctx.fillStyle=body;roundRect(12,13,126,62,31,true);

  ctx.fillStyle='#ff82bd';ctx.beginPath();ctx.moveTo(117,14);ctx.quadraticCurveTo(157,19,174,44);ctx.quadraticCurveTo(156,68,117,75);ctx.closePath();ctx.fill();

  const glass=ctx.createLinearGradient(56,15,104,60);
  glass.addColorStop(0,'#e5fdff');glass.addColorStop(.48,'#70d0ed');glass.addColorStop(1,'#365b9b');
  ctx.fillStyle=glass;ctx.beginPath();ctx.ellipse(84,43,39,26,-.04,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.75)';ctx.lineWidth=3;ctx.stroke();

  drawCockpitGirl(71,45,.78,'#ff82bd');
  drawCockpitGirl(98,47,.69,'#7deaff');

  ctx.fillStyle='#ffe47a';ctx.beginPath();ctx.arc(33,44,7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.65)';ctx.beginPath();ctx.ellipse(73,29,17,6,-.25,0,Math.PI*2);ctx.fill();
  ctx.restore();
}
function drawCockpitGirl(x,y,s,suit){
  ctx.save();ctx.translate(x,y);ctx.scale(s,s);
  ctx.fillStyle=suit;ctx.beginPath();ctx.arc(0,13,13,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f2c5a2';ctx.beginPath();ctx.arc(0,-1,10.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f4df91';
  ctx.beginPath();ctx.arc(-7,-5,7,0,Math.PI*2);ctx.arc(1,-9,8,0,Math.PI*2);ctx.arc(8,-4,7,0,Math.PI*2);
  ctx.arc(-9,2,5,0,Math.PI*2);ctx.arc(10,3,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#2b2750';ctx.beginPath();ctx.arc(-3,0,1.2,0,Math.PI*2);ctx.arc(4,0,1.2,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawHazard(h){
  if(h.type==='asteroid')drawAsteroid(h);
  else if(h.type==='cloud')drawCloud(h);
  else drawComet(h);
}
function drawAsteroid(h){
  ctx.save();ctx.translate(h.x,h.y);ctx.rotate(h.rot);
  const g=ctx.createRadialGradient(-h.r*.3,-h.r*.35,3,0,0,h.r);
  g.addColorStop(0,'#b8afc8');g.addColorStop(.56,'#716986');g.addColorStop(1,'#3d3853');
  ctx.fillStyle=g;ctx.beginPath();
  for(let i=0;i<12;i++){
    const a=i*Math.PI/6,rr=h.r*(.82+.18*Math.sin(i*4.8+h.phase));
    i?ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr):ctx.moveTo(Math.cos(a)*rr,Math.sin(a)*rr);
  }
  ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(45,40,65,.4)';
  [[-.25,-.18,.22],[.3,.18,.15],[-.05,.36,.12]].forEach(q=>{
    ctx.beginPath();ctx.arc(h.r*q[0],h.r*q[1],h.r*q[2],0,Math.PI*2);ctx.fill();
  });
  ctx.restore();
}
function drawCloud(h){
  ctx.save();ctx.translate(h.x,h.y);
  ctx.shadowColor='#72e8ff';ctx.shadowBlur=24;
  const g=ctx.createRadialGradient(-10,-12,6,0,0,h.r);
  g.addColorStop(0,'rgba(208,250,255,.95)');g.addColorStop(.42,'rgba(102,209,255,.78)');g.addColorStop(1,'rgba(92,79,210,.15)');
  ctx.fillStyle=g;
  for(let i=0;i<5;i++){
    const a=i*Math.PI*2/5+h.phase*.12;
    ctx.beginPath();ctx.arc(Math.cos(a)*h.r*.36,Math.sin(a)*h.r*.22,h.r*.55,0,Math.PI*2);ctx.fill();
  }
  ctx.strokeStyle='#fff59a';ctx.lineWidth=3;ctx.shadowColor='#fff59a';ctx.shadowBlur=12;
  ctx.beginPath();ctx.moveTo(-8,-h.r*.5);ctx.lineTo(8,-10);ctx.lineTo(-5,8);ctx.lineTo(10,h.r*.48);ctx.stroke();
  ctx.restore();
}
function drawComet(h){
  ctx.save();ctx.translate(h.x,h.y);ctx.rotate(-.15+h.rot*.1);
  const tail=ctx.createLinearGradient(-h.r*3,0,0,0);
  tail.addColorStop(0,'rgba(255,92,172,0)');tail.addColorStop(.58,'rgba(255,126,190,.5)');tail.addColorStop(1,'rgba(255,244,175,.92)');
  ctx.fillStyle=tail;ctx.beginPath();ctx.moveTo(-h.r*3,-h.r*.48);ctx.lineTo(0,-h.r*.78);ctx.lineTo(0,h.r*.78);ctx.lineTo(-h.r*3,h.r*.48);ctx.closePath();ctx.fill();
  const g=ctx.createRadialGradient(-h.r*.2,-h.r*.2,2,0,0,h.r);
  g.addColorStop(0,'#fffbd2');g.addColorStop(.45,'#ffbd6b');g.addColorStop(1,'#bb496f');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,h.r,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawPickup(p){
  ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.phase*.35);
  ctx.shadowColor=levelIndex===1?'#7deaff':'#ffe47a';ctx.shadowBlur=22;
  const g=ctx.createLinearGradient(-p.r,-p.r,p.r,p.r);
  g.addColorStop(0,'#fffbd0');
  g.addColorStop(.46,levelIndex===1?'#7deaff':'#ffe56d');
  g.addColorStop(1,'#ff83bd');
  ctx.fillStyle=g;ctx.beginPath();
  for(let i=0;i<10;i++){
    const rr=i%2===0?p.r:p.r*.43,a=-Math.PI/2+i*Math.PI/5;
    i?ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr):ctx.moveTo(Math.cos(a)*rr,Math.sin(a)*rr);
  }
  ctx.closePath();ctx.fill();ctx.shadowBlur=0;ctx.restore();
}
function drawPlanet(P){
  ctx.save();ctx.translate(P.x,P.y);
  if(P.ring){
    ctx.strokeStyle='rgba(172,239,255,.48)';ctx.lineWidth=P.r*.16;
    ctx.beginPath();ctx.ellipse(0,0,P.r*1.55,P.r*.34,-.2,0,Math.PI*2);ctx.stroke();
  }
  const g=ctx.createRadialGradient(-P.r*.35,-P.r*.38,P.r*.08,0,0,P.r);
  g.addColorStop(0,P.c2);g.addColorStop(1,P.c1);
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,P.r,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=.16;ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(-P.r*.26,-P.r*.26,P.r*.42,P.r*.17,-.5,0,Math.PI*2);ctx.fill();
  ctx.restore();ctx.globalAlpha=1;
}
function drawParticle(p){
  ctx.globalAlpha=clamp(p.life*1.7,0,1);ctx.fillStyle=p.color;
  ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
}
function drawFingerTarget(){
  ctx.strokeStyle='rgba(125,234,255,.48)';ctx.lineWidth=3;
  ctx.beginPath();ctx.arc(target.x,target.y,28+Math.sin(time*8)*4,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.86)';ctx.beginPath();ctx.arc(target.x,target.y,5,0,Math.PI*2);ctx.fill();
}
function drawMessage(text){
  ctx.save();ctx.textAlign='center';ctx.font='850 21px ui-rounded,system-ui';
  const w=Math.min(930,Math.max(430,ctx.measureText(text).width+90));
  ctx.fillStyle='rgba(5,8,31,.76)';roundRect(W/2-w/2,26,w,58,29,true);
  ctx.strokeStyle='rgba(255,255,255,.17)';ctx.lineWidth=2;roundRect(W/2-w/2,26,w,58,29,false,true);
  ctx.fillStyle='#fff';ctx.fillText(text,W/2,63);ctx.restore();
}
function roundRect(x,y,w,h,r,fill=false,stroke=false){
  const rr=Math.min(r,w/2,h/2);
  ctx.beginPath();ctx.moveTo(x+rr,y);ctx.arcTo(x+w,y,x+w,y+h,rr);ctx.arcTo(x+w,y+h,x,y+h,rr);
  ctx.arcTo(x,y+h,x,y,rr);ctx.arcTo(x,y,x+w,y,rr);ctx.closePath();
  if(fill)ctx.fill();if(stroke)ctx.stroke();
}

function loop(ts){
  const dt=Math.min(.033,(ts-last)/1000||0);last=ts;
  update(dt);draw();requestAnimationFrame(loop);
}
updateHud();requestAnimationFrame(loop);
})();
