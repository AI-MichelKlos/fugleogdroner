<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Stjernens Hemmelige Rute</title>
  <style>
    :root{
      --bg:#090b2b; --panel:#15194a; --accent:#ffd85a; --pink:#ff78b8;
      --cyan:#63e6ff; --white:#f8f8ff; --green:#7cf29a;
    }
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;overflow:hidden}
    body{
      display:grid; place-items:center;
      background:radial-gradient(circle at 50% 20%,#252b77 0,#0a0d31 45%,#040516 100%);
      color:var(--white); font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      touch-action:none; overscroll-behavior:none;
    }
    #wrap{
      width:100vw; height:100vh; padding:8px;
      display:grid; grid-template-rows:auto 1fr auto;
    }
    #topbar{
      display:flex; justify-content:space-between; align-items:center; gap:12px;
      background:rgba(21,25,74,.92); border:2px solid rgba(255,255,255,.15);
      border-radius:16px; padding:10px 14px; margin-bottom:10px;
      box-shadow:0 8px 28px rgba(0,0,0,.3);
    }
    #title{font-weight:900; letter-spacing:.3px}
    #status{font-weight:700; color:var(--accent); text-align:right}
    canvas{
      width:100%; height:100%; min-height:0; display:block; border-radius:18px;
      background:#05071f; border:3px solid rgba(255,255,255,.16);
      box-shadow:0 16px 50px rgba(0,0,0,.45);
      touch-action:none;
    }
    #help{
      margin-top:8px; text-align:center; color:#dce2ff; font-size:13px;
      background:rgba(21,25,74,.75); border-radius:14px; padding:6px 10px;
    }
    .btns{display:flex; justify-content:center; gap:8px; margin-top:6px; flex-wrap:wrap}
    button{
      border:0; border-radius:999px; padding:10px 16px; font-weight:800;
      background:var(--accent); color:#2a2450; cursor:pointer;
      box-shadow:0 4px 0 #c69f28;
    }
    #mobileControls{
      position:fixed; inset:0; pointer-events:none; z-index:10;
      display:flex; justify-content:space-between; align-items:flex-end;
      padding:0 22px 18px;
    }
    .pad,.actions{pointer-events:auto; display:grid; gap:8px}
    .pad{grid-template-columns:64px 64px 64px; grid-template-rows:58px 58px}
    .pad button,.actions button{
      width:64px; height:58px; padding:0; font-size:26px;
      background:rgba(255,255,255,.88); box-shadow:0 4px 0 rgba(0,0,0,.25);
      user-select:none; -webkit-user-select:none;
    }
    .pad .up{grid-column:2}.pad .left{grid-column:1;grid-row:2}
    .pad .down{grid-column:2;grid-row:2}.pad .right{grid-column:3;grid-row:2}
    .actions{grid-template-columns:82px; align-content:end}
    .actions button{width:82px;height:64px;font-size:18px;background:rgba(255,216,90,.94)}
    #rotateNotice{
      display:none; position:fixed; inset:0; z-index:50; place-items:center;
      background:#090b2b; color:white; text-align:center; padding:30px;
    }
    #rotateNotice div{max-width:420px;font-size:24px;font-weight:900;line-height:1.35}
    @media (orientation:portrait){
      #rotateNotice{display:grid}
      #wrap,#mobileControls{display:none}
    }
    @media (max-height:500px){
      #topbar{padding:6px 10px;margin-bottom:6px;font-size:14px}
      #help{display:none}
      #wrap{grid-template-rows:auto 1fr}
      .pad{grid-template-columns:56px 56px 56px;grid-template-rows:50px 50px}
      .pad button{width:56px;height:50px}
      .actions button{width:76px;height:56px}
    }
    button:active{transform:translateY(2px); box-shadow:0 2px 0 #c69f28}
  </style>
</head>
<body>
<div id="wrap">
  <div id="topbar">
    <div id="title">🚀 Stjernens Hemmelige Rute</div>
    <div id="status">Tryk START</div>
  </div>
  <canvas id="game" width="960" height="540" aria-label="Rumspil"></canvas>
  <div id="help">
    Mobilspil i vandret format · Brug knapperne på skærmen
    <div class="btns">
      <button id="startBtn">Start / fortsæt</button>
      <button id="restartBtn">Start forfra</button>
    </div>
  </div>
</div>

<div id="mobileControls">
  <div class="pad">
    <button class="up" data-key="ArrowUp">▲</button>
    <button class="left" data-key="ArrowLeft">◀</button>
    <button class="down" data-key="ArrowDown">▼</button>
    <button class="right" data-key="ArrowRight">▶</button>
  </div>
  <div class="actions">
    <button id="switchBtn">SKIFT</button>
    <button id="actionBtn">START</button>
  </div>
</div>

<div id="rotateNotice"><div>📱 Drej telefonen vandret for at spille</div></div>

<script>
(() => {
  const c = document.getElementById('game');
  const ctx = c.getContext('2d');
  const statusEl = document.getElementById('status');
  const keys = {};
  let scene = 'menu', level = 0, t = 0, last = 0;
  let score = 0, message = '', messageTimer = 0;

  const W = c.width, H = c.height;
  const stars = Array.from({length:140},()=>({
    x:Math.random()*W, y:Math.random()*H, r:Math.random()*2+0.5, s:Math.random()*40+15
  }));

  const girl1 = {x:160,y:395,w:38,h:58,active:true,name:'Nova',age:8};
  const girl2 = {x:220,y:405,w:34,h:50,active:false,name:'Luna',age:4};

  let rocket, asteroids, gems, planetItems, robotParts, doors, switches;

  function resetLevel(n){
    level = n; score = 0; message = ''; messageTimer = 0;
    if(n===1){
      rocket={x:120,y:270,vx:0,vy:0,w:90,h:42,hp:3};
      asteroids=[]; gems=[];
      for(let i=0;i<10;i++) asteroids.push({x:650+i*180,y:80+Math.random()*360,r:24+Math.random()*25});
      for(let i=0;i<8;i++) gems.push({x:480+i*210,y:80+Math.random()*370,r:12,got:false});
      scene='play';
      setMessage('Bane 1: Flyv gennem asteroiderne og saml 5 stjerner!');
    } else if(n===2){
      Object.assign(girl1,{x:110,y:395}); Object.assign(girl2,{x:160,y:405});
      planetItems=[
        {x:350,y:410,type:'crystal',got:false},
        {x:535,y:340,type:'crystal',got:false},
        {x:760,y:400,type:'crystal',got:false}
      ];
      robotParts=[
        {x:285,y:450,got:false},{x:610,y:455,got:false},{x:820,y:300,got:false}
      ];
      scene='play';
      setMessage('Bane 2: Udforsk planeten og find 3 robotdele.');
    } else if(n===3){
      Object.assign(girl1,{x:120,y:420,active:true});
      Object.assign(girl2,{x:170,y:430,active:false});
      doors=[{x:420,y:310,w:28,h:170,open:false},{x:735,y:260,w:28,h:220,open:false}];
      switches=[
        {x:330,y:455,who:1,on:false},
        {x:655,y:455,who:2,on:false}
      ];
      gems=[{x:875,y:420,r:18,got:false}];
      scene='play';
      setMessage('Bane 3: Skift med Q. Nova og Luna skal hjælpe hinanden.');
    }
    updateStatus();
  }

  function setMessage(s,secs=3){ message=s; messageTimer=secs; }

  function updateStatus(){
    const actionBtn=document.getElementById('actionBtn');
    const switchBtn=document.getElementById('switchBtn');
    if(actionBtn) actionBtn.textContent=scene==='menu'?'START':scene==='win'?'IGEN':'SPIL';
    if(switchBtn) switchBtn.style.opacity=(level===3&&scene==='play')?'1':'.45';
    if(scene==='menu') statusEl.textContent='Tryk START';
    else if(scene==='win') statusEl.textContent='Spillet er gennemført!';
    else if(level===1) statusEl.textContent=`Bane 1 · Stjerner: ${score}/5 · Skjold: ${rocket.hp}`;
    else if(level===2) statusEl.textContent=`Bane 2 · Robotdele: ${score}/3`;
    else if(level===3) statusEl.textContent=`Bane 3 · Aktiv: ${girl1.active?'Nova':'Luna'}`;
  }

  function circleRect(cx,cy,r,rx,ry,rw,rh){
    const nx=Math.max(rx,Math.min(cx,rx+rw)), ny=Math.max(ry,Math.min(cy,ry+rh));
    const dx=cx-nx,dy=cy-ny; return dx*dx+dy*dy<r*r;
  }

  function update(dt){
    t += dt;
    stars.forEach(s=>{s.x-=s.s*dt;if(s.x<0){s.x=W;s.y=Math.random()*H}});
    if(messageTimer>0) messageTimer-=dt;
    if(scene!=='play') return;

    if(level===1){
      const a=500;
      if(keys.ArrowUp||keys.w) rocket.vy-=a*dt;
      if(keys.ArrowDown||keys.s) rocket.vy+=a*dt;
      if(keys.ArrowLeft||keys.a) rocket.vx-=a*dt;
      if(keys.ArrowRight||keys.d) rocket.vx+=a*dt;
      rocket.vx*=0.95; rocket.vy*=0.95;
      rocket.x+=rocket.vx*dt; rocket.y+=rocket.vy*dt;
      rocket.x=Math.max(10,Math.min(W-rocket.w-10,rocket.x));
      rocket.y=Math.max(30,Math.min(H-rocket.h-30,rocket.y));

      asteroids.forEach(a=>{a.x-=190*dt;if(a.x<-60){a.x=W+Math.random()*500;a.y=60+Math.random()*420}});
      gems.forEach(g=>{g.x-=190*dt;if(g.x<-30&&!g.got){g.x=W+Math.random()*650;g.y=60+Math.random()*410}});
      for(const a of asteroids){
        if(circleRect(a.x,a.y,a.r,rocket.x,rocket.y,rocket.w,rocket.h)){
          rocket.hp--; a.x=W+300+Math.random()*500; a.y=70+Math.random()*390;
          setMessage('Bump! Skjoldet mistede energi.',1.5);
          if(rocket.hp<=0){rocket.hp=3;score=0;setMessage('Raketten blev repareret. Prøv igen!',2);}
        }
      }
      for(const g of gems){
        if(!g.got&&circleRect(g.x,g.y,g.r,rocket.x,rocket.y,rocket.w,rocket.h)){
          g.got=true; score++; setMessage('En stjernekrystal!',1);
          setTimeout(()=>{g.x=W+Math.random()*500;g.y=60+Math.random()*410;g.got=false},800);
          if(score>=5){scene='transition';setMessage('Flot! Næste stop: Regnbueplaneten.',4);setTimeout(()=>resetLevel(2),2500);}
        }
      }
    }

    if(level===2){
      moveCharacter(girl1,dt,230);
      girl2.x += (girl1.x-55-girl2.x)*0.045;
      girl2.y += (girl1.y+10-girl2.y)*0.045;
      girl1.y=Math.min(430,Math.max(290,girl1.y));
      girl2.y=Math.min(435,Math.max(300,girl2.y));
      for(const p of robotParts){
        if(!p.got && Math.hypot(girl1.x-p.x,girl1.y-p.y)<52){
          p.got=true;score++;setMessage('I fandt en robotdel!',1.3);
          if(score===3){scene='transition';setMessage('Robotten virker igen! Klar til samarbejdsbanen.',4);setTimeout(()=>resetLevel(3),2600);}
        }
      }
    }

    if(level===3){
      const active=girl1.active?girl1:girl2;
      moveCharacter(active,dt,girl1.active?220:185);
      active.y=Math.min(435,Math.max(290,active.y));
      const inactive=girl1.active?girl2:girl1;
      inactive.y=Math.min(435,Math.max(290,inactive.y));

      for(const d of doors){
        if(!d.open && active.x+active.w>d.x && active.x<d.x+d.w && active.y+active.h>d.y){
          if(active.x<d.x) active.x=d.x-active.w; else active.x=d.x+d.w;
        }
      }
      switches.forEach((sw,i)=>{
        const who=i===0?girl1:girl2;
        if(Math.hypot(who.x-sw.x,who.y-sw.y)<58){
          sw.on=true; doors[i].open=true;
        }
      });
      if(!gems[0].got && Math.hypot(active.x-gems[0].x,active.y-gems[0].y)<55){
        gems[0].got=true; scene='win'; updateStatus();
      }
    }
    updateStatus();
  }

  function moveCharacter(g,dt,speed){
    if(keys.ArrowLeft||keys.a) g.x-=speed*dt;
    if(keys.ArrowRight||keys.d) g.x+=speed*dt;
    if(keys.ArrowUp||keys.w) g.y-=speed*dt;
    if(keys.ArrowDown||keys.s) g.y+=speed*dt;
    g.x=Math.max(18,Math.min(W-g.w-18,g.x));
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    drawSpace();
    if(scene==='menu') drawMenu();
    else {
      if(level===1) drawLevel1();
      if(level===2) drawLevel2();
      if(level===3) drawLevel3();
      if(scene==='win') drawWin();
      if(messageTimer>0 || scene==='transition') drawMessage(message);
    }
  }

  function drawSpace(){
    ctx.fillStyle='#05071f';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';
    for(const s of stars){ctx.globalAlpha=.4+.6*Math.sin(t*2+s.x);ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;
  }

  function drawMenu(){
    ctx.textAlign='center';
    ctx.fillStyle='#ffd85a';ctx.font='900 48px system-ui';ctx.fillText('Stjernens Hemmelige Rute',W/2,120);
    drawRocket(W/2-45,210,1.4);
    drawGirl(W/2-95,360,1,true,'#ff78b8');
    drawGirl(W/2+35,370,.9,false,'#63e6ff');
    ctx.fillStyle='#eef1ff';ctx.font='700 22px system-ui';ctx.fillText('Tre baner med flyvning, eventyr og samarbejde',W/2,465);
    ctx.fillStyle='#7cf29a';ctx.font='800 24px system-ui';ctx.fillText('Tryk START',W/2,505);
  }

  function drawRocket(x,y,s=1){
    ctx.save();ctx.translate(x,y);ctx.scale(s,s);
    ctx.fillStyle='#e9ecff';roundRect(0,5,78,32,16,true);
    ctx.fillStyle='#ff78b8';ctx.beginPath();ctx.moveTo(70,5);ctx.lineTo(95,21);ctx.lineTo(70,37);ctx.closePath();ctx.fill();
    ctx.fillStyle='#63e6ff';ctx.beginPath();ctx.arc(28,21,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffd85a';ctx.beginPath();ctx.moveTo(0,13);ctx.lineTo(-22,21);ctx.lineTo(0,29);ctx.fill();
    ctx.restore();
  }

  function drawLevel1(){
    ctx.fillStyle='#172056';ctx.fillRect(0,470,W,70);
    drawRocket(rocket.x,rocket.y,1);
    asteroids.forEach(a=>{ctx.fillStyle='#6c6386';ctx.beginPath();ctx.arc(a.x,a.y,a.r,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#4f4868';ctx.beginPath();ctx.arc(a.x-a.r*.25,a.y-a.r*.15,a.r*.25,0,Math.PI*2);ctx.fill();});
    gems.forEach(g=>{if(!g.got) drawGem(g.x,g.y,g.r)});
  }

  function drawLevel2(){
    const grad=ctx.createLinearGradient(0,330,0,H);grad.addColorStop(0,'#7647a8');grad.addColorStop(1,'#2a6d5f');
    ctx.fillStyle=grad;ctx.fillRect(0,330,W,210);
    ctx.fillStyle='#9a6dc0';for(let x=0;x<W;x+=120){ctx.beginPath();ctx.arc(x,350,90,Math.PI,0);ctx.fill();}
    ctx.fillStyle='#7cf29a';ctx.beginPath();ctx.ellipse(850,190,90,45,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#63e6ff';ctx.beginPath();ctx.ellipse(850,190,130,12,0,0,Math.PI*2);ctx.fill();
    robotParts.forEach(p=>{if(!p.got){ctx.fillStyle='#dfe4ff';ctx.fillRect(p.x-13,p.y-13,26,26);ctx.fillStyle='#ffd85a';ctx.fillRect(p.x-5,p.y-5,10,10);}});
    drawGirl(girl1.x,girl1.y,1,true,'#ff78b8');
    drawGirl(girl2.x,girl2.y,.88,false,'#63e6ff');
    drawRobot(880,430);
  }

  function drawLevel3(){
    ctx.fillStyle='#25336f';ctx.fillRect(0,475,W,65);
    ctx.fillStyle='#393f83';
    for(let i=0;i<8;i++)ctx.fillRect(i*130,340+(i%2)*25,100,135);
    doors.forEach(d=>{
      if(!d.open){ctx.fillStyle='#ff6f91';ctx.fillRect(d.x,d.y,d.w,d.h);
        ctx.fillStyle='#ffd85a';for(let y=d.y+12;y<d.y+d.h;y+=28)ctx.fillRect(d.x+6,y,d.w-12,8);}
      else {ctx.strokeStyle='#7cf29a';ctx.lineWidth=4;ctx.strokeRect(d.x,d.y,d.w,d.h);}
    });
    switches.forEach(sw=>{ctx.fillStyle=sw.on?'#7cf29a':'#ffd85a';ctx.fillRect(sw.x-18,sw.y-10,36,20);});
    if(!gems[0].got) drawGem(gems[0].x,gems[0].y,gems[0].r);
    drawGirl(girl1.x,girl1.y,1,true,'#ff78b8',girl1.active);
    drawGirl(girl2.x,girl2.y,.88,false,'#63e6ff',girl2.active);
    ctx.fillStyle='#fff';ctx.font='700 16px system-ui';ctx.textAlign='left';
    ctx.fillText('Nova-knap',285,505);ctx.fillText('Luna-knap',610,505);
  }

  function drawGirl(x,y,s=1,older=true,suit='#ff78b8',active=false){
    ctx.save();ctx.translate(x,y);ctx.scale(s,s);
    if(active){ctx.strokeStyle='#ffd85a';ctx.lineWidth=4;ctx.beginPath();ctx.ellipse(18,28,30,42,0,0,Math.PI*2);ctx.stroke();}
    ctx.fillStyle=suit;roundRect(2,22,32,36,12,true);
    ctx.fillStyle='#f3c7a5';ctx.beginPath();ctx.arc(18,14,13,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#f4df8d';
    ctx.beginPath();ctx.arc(10,8,11,0,Math.PI*2);ctx.arc(22,5,12,0,Math.PI*2);ctx.arc(29,12,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#2a2450';ctx.beginPath();ctx.arc(14,14,1.5,0,Math.PI*2);ctx.arc(23,14,1.5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#2a2450';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(18,18,5,0,Math.PI);ctx.stroke();
    ctx.fillStyle='#dfe4ff';ctx.fillRect(7,54,8,8);ctx.fillRect(24,54,8,8);
    ctx.restore();
  }

  function drawRobot(x,y){
    ctx.save();ctx.translate(x,y);
    ctx.fillStyle=score===3?'#7cf29a':'#b7bfdc';roundRect(-28,-42,56,52,10,true);
    ctx.fillStyle='#63e6ff';ctx.beginPath();ctx.arc(-10,-20,5,0,Math.PI*2);ctx.arc(10,-20,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffd85a';ctx.fillRect(-16,-4,32,5);
    ctx.restore();
  }

  function drawGem(x,y,r){
    ctx.save();ctx.translate(x,y);ctx.rotate(t);
    ctx.fillStyle='#ffd85a';ctx.beginPath();
    for(let i=0;i<10;i++){const rr=i%2===0?r:r*.45, a=-Math.PI/2+i*Math.PI/5;ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);}
    ctx.closePath();ctx.fill();ctx.restore();
  }

  function drawMessage(s){
    ctx.fillStyle='rgba(10,13,49,.88)';roundRect(120,28,W-240,62,18,true);
    ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=2;roundRect(120,28,W-240,62,18,false,true);
    ctx.fillStyle='#fff';ctx.font='800 21px system-ui';ctx.textAlign='center';ctx.fillText(s,W/2,67);
  }

  function drawWin(){
    ctx.fillStyle='rgba(5,7,31,.82)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';ctx.fillStyle='#ffd85a';ctx.font='900 52px system-ui';ctx.fillText('I klarede hele ruten!',W/2,165);
    drawGirl(W/2-85,260,1.25,true,'#ff78b8',true);drawGirl(W/2+25,275,1.1,false,'#63e6ff',true);
    ctx.fillStyle='#eef1ff';ctx.font='700 24px system-ui';ctx.fillText('Nova og Luna tændte stjernefyret sammen.',W/2,400);
    ctx.fillStyle='#7cf29a';ctx.font='800 22px system-ui';ctx.fillText('Tryk IGEN for at spille igen',W/2,455);
  }

  function roundRect(x,y,w,h,r,fill=false,stroke=false){
    ctx.beginPath();ctx.roundRect(x,y,w,h,r);if(fill)ctx.fill();if(stroke)ctx.stroke();
  }

  function handleKeyDown(e){
    keys[e.key]=true;
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
    if((e.key==='Enter'||e.key===' ') && scene==='menu') resetLevel(1);
    if((e.key==='q'||e.key==='Q') && level===3 && scene==='play'){
      girl1.active=!girl1.active;girl2.active=!girl2.active;setMessage(`${girl1.active?'Nova':'Luna'} styrer nu.`,1);
    }
    if((e.key==='r'||e.key==='R') && scene==='win') resetLevel(1);
  }
  addEventListener('keydown',handleKeyDown);
  addEventListener('keyup',e=>keys[e.key]=false);

  document.getElementById('startBtn').onclick=()=>{if(scene==='menu')resetLevel(1);};
  document.getElementById('restartBtn').onclick=()=>resetLevel(1);

  // Mobilknapper
  document.querySelectorAll('[data-key]').forEach(btn=>{
    const key=btn.dataset.key;
    const down=e=>{e.preventDefault();keys[key]=true;};
    const up=e=>{e.preventDefault();keys[key]=false;};
    btn.addEventListener('pointerdown',down);
    btn.addEventListener('pointerup',up);
    btn.addEventListener('pointercancel',up);
    btn.addEventListener('pointerleave',up);
  });

  document.getElementById('switchBtn').addEventListener('pointerdown',e=>{
    e.preventDefault();
    if(level===3 && scene==='play'){
      girl1.active=!girl1.active;girl2.active=!girl2.active;
      setMessage(`${girl1.active?'Nova':'Luna'} styrer nu.`,1);
    }
  });

  document.getElementById('actionBtn').addEventListener('pointerdown',e=>{
    e.preventDefault();
    if(scene==='menu') resetLevel(1);
    else if(scene==='win') resetLevel(1);
  });

  c.addEventListener('pointerdown',e=>{
    e.preventDefault();
    if(scene==='menu') resetLevel(1);
  });

  async function tryFullscreen(){
    try{
      if(!document.fullscreenElement && document.documentElement.requestFullscreen){
        await document.documentElement.requestFullscreen();
      }
    }catch(_){}
  }
  document.addEventListener('pointerdown',tryFullscreen,{once:true});

  function loop(ts){
    const dt=Math.min(.033,(ts-last)/1000||0);last=ts;update(dt);draw();requestAnimationFrame(loop);
  }
  updateStatus();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
